<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>川口GD ピーキングアプリ 2026</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2236;
  --card: #1e2d45;
  --card2: #243352;
  --border: #2a3f60;
  --accent: #e8c84a;
  --accent2: #f97316;
  --accent3: #22d3ee;
  --text: #e8edf5;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #22c55e;
  --red: #ef4444;
  --purple: #a78bfa;
  --nav-h: 64px;
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','ヒラギノ角ゴシック',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h)+16px)}
/* Nav */
.nav-bar{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--text3);font-size:10px;cursor:pointer;transition:color 0.2s;padding:8px 4px}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
/* Pages */
.page{display:none;min-height:100vh;padding:16px 16px 8px}
.page.active{display:block}
/* Common */
.page-title{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:16px;letter-spacing:0.05em}
.section-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin:20px 0 10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-sm{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-accent{background:rgba(232,200,74,0.15);color:var(--accent);border:1px solid rgba(232,200,74,0.3)}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.badge-green{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.badge-blue{background:rgba(34,211,238,0.15);color:var(--accent3);border:1px solid rgba(34,211,238,0.3)}
.badge-purple{background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3)}
.badge-orange{background:rgba(249,115,22,0.15);color:var(--accent2);border:1px solid rgba(249,115,22,0.3)}
/* Countdown */
.countdown{background:linear-gradient(135deg,var(--card) 0%,#1a3050 100%);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center}
.countdown-num{font-size:56px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-2px}
.countdown-label{font-size:13px;color:var(--text2);margin-top:4px}
/* Today quote */
.quote-card{background:linear-gradient(135deg,#1a2a45,#1e3355);border:1px solid rgba(232,200,74,0.25);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.quote-card::before{content:'"';position:absolute;top:-10px;left:12px;font-size:80px;color:rgba(232,200,74,0.08);font-family:Georgia,serif;line-height:1}
.quote-text{font-size:15px;font-weight:600;line-height:1.6;color:var(--text);margin-bottom:8px;position:relative;z-index:1}
.quote-author{font-size:12px;color:var(--accent);margin-bottom:8px}
.quote-apply{font-size:12px;color:var(--text2);line-height:1.5;padding-top:8px;border-top:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-accent{background:var(--accent);color:#0a0e1a}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:active{transform:scale(0.97)}
/* Checkbox */
.check-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,63,96,0.5);cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.check-box.checked{background:var(--accent);border-color:var(--accent);color:#0a0e1a}
.check-label{font-size:14px;line-height:1.4}
/* Input */
input[type=text],input[type=number],textarea,select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;padding:10px 12px;width:100%;font-family:inherit;appearance:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
.input-group{margin-bottom:14px}
.input-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--text2);background:var(--bg2);transition:all 0.2s;flex-shrink:0}
.tab.active{background:var(--accent);color:#0a0e1a;border-color:var(--accent)}
/* Sub-tabs */
.sub-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border);color:var(--text3);background:transparent;flex-shrink:0;transition:all 0.2s}
.sub-tab.active{background:var(--card2);color:var(--text);border-color:var(--accent3)}
/* Accordion */
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;cursor:pointer;border-bottom:1px solid var(--border)}
.accordion-header:last-child{border-bottom:none}
.accordion-body{display:none;padding:12px 0 4px}
.accordion-body.open{display:block}
.accordion-arrow{color:var(--text3);transition:transform 0.2s;font-size:16px}
.accordion-arrow.open{transform:rotate(180deg)}
/* Rating */
.rating-group{display:flex;gap:6px}
.rating-btn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.rating-btn.selected{background:var(--accent);color:#0a0e1a;border-color:var(--accent)}
/* Progress */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.5s}
/* Day card for calendar */
.day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.day-card.today{border-color:var(--accent)}
.day-card.game-day{border-color:var(--red)}
.day-card.peak-day{border-color:var(--purple)}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.day-date{font-size:16px;font-weight:700}
.day-weekday{font-size:12px;color:var(--text2)}
.day-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.day-aim{font-size:12px;color:var(--text2);line-height:1.5}
/* Stat row */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,63,96,0.4)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:13px;color:var(--text2)}
.stat-val{font-size:13px;font-weight:600;color:var(--text)}
/* Weekly summary */
.week-metric{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,63,96,0.4)}
.week-metric-icon{font-size:20px;width:36px;text-align:center}
.week-metric-info{flex:1}
.week-metric-label{font-size:12px;color:var(--text2)}
.week-metric-val{font-size:15px;font-weight:700}
/* Exercise card */
.ex-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.ex-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ex-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.ex-detail-item{background:rgba(0,0,0,0.2);border-radius:6px;padding:6px 8px}
.ex-detail-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.ex-detail-val{font-size:13px;font-weight:600}
.ex-note{font-size:12px;color:var(--text2);line-height:1.6;margin-top:6px}
.effect-tag{display:inline-block;background:rgba(34,211,238,0.1);color:var(--accent3);border:1px solid rgba(34,211,238,0.2);border-radius:4px;font-size:10px;padding:2px 6px;margin:2px}
/* Warning box */
.warn-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px}
.warn-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.warn-text{font-size:12px;color:var(--text2);line-height:1.6}
.tip-box{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px}
.tip-title{font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px}
.tip-text{font-size:12px;color:var(--text2);line-height:1.6}
.info-box{background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.25);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px}
/* Recipe */
.recipe-step{display:flex;gap:12px;margin-bottom:12px}
.recipe-step-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#0a0e1a;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recipe-step-text{font-size:13px;line-height:1.6;color:var(--text)}
/* Scrollable section */
.scroll-x{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scroll-x::-webkit-scrollbar{display:none}
/* Divider */
.divider{height:1px;background:var(--border);margin:14px 0}
/* Today priority banner */
.priority-banner{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.priority-A{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05));border:1px solid rgba(239,68,68,0.3)}
.priority-B{background:linear-gradient(135deg,rgba(232,200,74,0.12),rgba(232,200,74,0.04));border:1px solid rgba(232,200,74,0.25)}
.priority-C{background:linear-gradient(135deg,rgba(34,197,94,0.1),rgba(34,197,94,0.03));border:1px solid rgba(34,197,94,0.2)}
.priority-icon{font-size:28px}
.priority-info{flex:1}
.priority-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.priority-title{font-size:15px;font-weight:700}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 16px 40px;max-height:80vh;overflow-y:auto;width:100%}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.modal-close{float:right;font-size:22px;color:var(--text3);cursor:pointer;line-height:1}
/* Quote list */
.quote-list-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s}
.quote-list-item:active{border-color:var(--accent)}
.quote-list-text{font-size:13px;font-weight:600;line-height:1.5;margin-bottom:6px}
.quote-list-author{font-size:11px;color:var(--accent);margin-bottom:6px}
.quote-list-apply{font-size:11px;color:var(--text2)}
/* Form radio */
.radio-group{display:flex;gap:6px;flex-wrap:wrap}
.radio-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg3);transition:all 0.2s}
.radio-btn.selected{background:var(--accent);color:#0a0e1a;border-color:var(--accent)}
/* Sticky header */
.sticky-header{position:sticky;top:0;background:var(--bg);padding:12px 0 8px;z-index:10}
/* Phase indicator */
.phase-bar{display:flex;gap:4px;margin-bottom:16px}
.phase-item{flex:1;text-align:center;padding:8px 4px;border-radius:var(--radius-sm);font-size:10px;font-weight:600}
.phase-build{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.phase-taper{background:rgba(232,200,74,0.15);color:var(--accent);border:1px solid rgba(232,200,74,0.3)}
.phase-peak{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
/* Loading animation */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 2s infinite}
/* Icon helpers */
.icon{font-style:normal}
/* Scroll to top */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:12px}
</style>
</head>
<body>

<!-- ==================== PAGES ==================== -->

<!-- PAGE: HOME -->
<div class="page active" id="page-home">
<div class="sticky-header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <div id="home-date" style="font-size:13px;color:var(--text3)"></div>
      <div style="font-size:18px;font-weight:700;color:var(--text)" id="home-weekday"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:var(--text3)">大会まで</div>
      <div id="home-countdown" style="font-size:26px;font-weight:900;color:var(--accent)"></div>
    </div>
  </div>
</div>

<div id="home-priority"></div>
<div id="home-today-card"></div>

<!-- Quote -->
<div class="quote-card" id="home-quote-card">
  <div class="quote-text" id="home-quote-text"></div>
  <div class="quote-author" id="home-quote-author"></div>
  <div class="quote-apply" id="home-quote-apply"></div>
</div>
<div style="display:flex;gap:8px;margin-bottom:16px">
  <button class="btn btn-outline btn-sm" onclick="refreshQuote()">🔄 名言を更新</button>
  <button class="btn btn-outline btn-sm" onclick="openPage('page-quotes')">📋 名言一覧</button>
</div>

<!-- Today checklist -->
<div class="section-title">今日のチェックリスト</div>
<div class="card" id="home-checklist"></div>
<div style="margin-bottom:8px;color:var(--text3);font-size:11px;text-align:center">チェックすると自動保存されます</div>
</div>

<!-- PAGE: SCHEDULE (Calendar) -->
<div class="page" id="page-schedule">
<div class="sticky-header">
  <div class="page-title">📅 スケジュール</div>
  <div class="phase-bar">
    <div class="phase-item phase-build">蓄積期<br><span style="font-size:9px">5/2〜5/23</span></div>
    <div class="phase-item phase-taper">調整期<br><span style="font-size:9px">5/24〜6/4</span></div>
    <div class="phase-item phase-peak">ピーク<br><span style="font-size:9px">6/5〜6/7</span></div>
  </div>
</div>
<div id="schedule-list"></div>
</div>

<!-- PAGE: MENU -->
<div class="page" id="page-menu">
<div class="sticky-header">
  <div class="page-title">🏋️ メニュー</div>
  <div class="tabs" id="menu-tabs">
    <div class="tab active" onclick="showMenuTab('outdoor')" data-tab="outdoor">屋外スピード</div>
    <div class="tab" onclick="showMenuTab('mobility')" data-tab="mobility">自宅モビリティ</div>
    <div class="tab" onclick="showMenuTab('gym')" data-tab="gym">オープンジム</div>
    <div class="tab" onclick="showMenuTab('gameday')" data-tab="gameday">大会前日・当日</div>
    <div class="tab" onclick="showMenuTab('ng')" data-tab="ng">NGリスト</div>
    <div class="tab" onclick="showMenuTab('crossfit')" data-tab="crossfit">クロスフィット</div>
    <div class="tab" onclick="showMenuTab('wod')" data-tab="wod">WOD分析</div>
  </div>
</div>
<div id="menu-content"></div>
</div>

<!-- PAGE: FOOD -->
<div class="page" id="page-food">
<div class="sticky-header">
  <div class="page-title">🍚 食事計画</div>
  <div class="tabs">
    <div class="tab active" onclick="showFoodTab('plan')" data-ftab="plan">食事プラン</div>
    <div class="tab" onclick="showFoodTab('recipe')" data-ftab="recipe">固定レシピ</div>
    <div class="tab" onclick="showFoodTab('gameday')" data-ftab="gameday">試合日・前日</div>
  </div>
</div>
<div id="food-content"></div>
</div>

<!-- PAGE: RECORD -->
<div class="page" id="page-record">
<div class="sticky-header">
  <div class="page-title">✅ 達成記録</div>
  <div class="tabs">
    <div class="tab active" onclick="showRecordTab('daily')" data-rtab="daily">今日</div>
    <div class="tab" onclick="showRecordTab('weekly')" data-rtab="weekly">今週</div>
    <div class="tab" onclick="showRecordTab('history')" data-rtab="history">履歴</div>
  </div>
</div>
<div id="record-content"></div>
</div>

<!-- PAGE: QUOTES (sub-page) -->
<div class="page" id="page-quotes">
<div class="sticky-header">
  <div style="display:flex;align-items:center;gap:12px">
    <span class="back-btn" onclick="openPage('page-home')">← 戻る</span>
    <div class="page-title" style="margin-bottom:0">💬 名言一覧</div>
  </div>
</div>
<div id="quotes-list"></div>
</div>

<!-- Nav Bar -->
<nav class="nav-bar">
  <div class="nav-item active" onclick="openPage('page-home')" id="nav-home">
    <div class="nav-icon">🏠</div>
    <div>今日</div>
  </div>
  <div class="nav-item" onclick="openPage('page-schedule')" id="nav-schedule">
    <div class="nav-icon">📅</div>
    <div>予定</div>
  </div>
  <div class="nav-item" onclick="openPage('page-menu')" id="nav-menu">
    <div class="nav-icon">🏋️</div>
    <div>メニュー</div>
  </div>
  <div class="nav-item" onclick="openPage('page-food')" id="nav-food">
    <div class="nav-icon">🍚</div>
    <div>食事</div>
  </div>
  <div class="nav-item" onclick="openPage('page-record')" id="nav-record">
    <div class="nav-icon">✅</div>
    <div>記録</div>
  </div>
</nav>

<script>
// ==================== DATA ====================

const GAME_DATE = new Date('2026-06-06T00:00:00');

const QUOTES = [
  {text:"準備は裏切らない",author:"一流アスリートの考え方",apply:"今日の小さな準備が、6月6日の一振りを作る。"},
  {text:"勝負は本番前にほぼ決まっている",author:"勝負師の格言",apply:"疲労を抜く日も、勝つための練習。"},
  {text:"才能より、継続できる仕組みが強い",author:"経営者の考え方",apply:"気合いではなく、チェック欄を埋めるだけで前に進む。"},
  {text:"一流は、やる日よりも休む日の質が高い",author:"スポーツ科学の知見",apply:"休養日はサボりではなく、出力を高める工程。"},
  {text:"焦らず、しかし止まらない",author:"長距離アスリートの思想",apply:"減量もスイング改善も、毎日1%で十分。"},
  {text:"限界は自分で決めるな。ただし、疲労は数値で管理しろ",author:"S&Cコーチの言葉",apply:"追い込みたい気持ちより、6月6日の出力を優先する。"},
  {text:"身体は正直だ。積み上げた日数分だけ、当日に返ってくる",author:"プロ野球コーチの考え方",apply:"今日の積み重ねが、本番のスイングスピードになる。"},

let currentQuoteIdx = -1;

// ==================== UTILS ====================
function getToday(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function getDaysUntilGame(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.ceil((GAME_DATE - today) / (1000*60*60*24));
  return diff;
}
function getWeekday(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  return ['日','月','火','水','木','金','土'][d.getDay()];
}
function el(id){return document.getElementById(id)}
function qs(sel){return document.querySelector(sel)}

// ==================== NAVIGATION ====================
function openPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el(pageId).classList.add('active');
  // update nav
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navMap = {'page-home':'nav-home','page-schedule':'nav-schedule','page-menu':'nav-menu','page-food':'nav-food','page-record':'nav-record'};
  if(navMap[pageId]) el(navMap[pageId]).classList.add('active');
  window.scrollTo(0,0);
  // render content
  if(pageId==='page-schedule') renderSchedule();
  if(pageId==='page-quotes') renderQuotes();
  if(pageId==='page-menu') renderMenu(currentMenuTab);
  if(pageId==='page-food') renderFood(currentFoodTab);
  if(pageId==='page-record') renderRecord(currentRecordTab);
}

// ==================== QUOTES ====================
function getQuoteForToday(){
  const today = getToday();
  const idx = parseInt(today.replace(/-/g,'')) % QUOTES.length;
  return idx;
}
function renderQuoteOnHome(idx){
  const q = QUOTES[idx];
  el('home-quote-text').textContent = q.text;
  el('home-quote-author').textContent = `── ${q.author}`;
  el('home-quote-apply').textContent = `✦ 今日の活かし方：${q.apply}`;
  currentQuoteIdx = idx;
  localStorage.setItem('currentQuoteIdx', idx);
}
function refreshQuote(){
  let idx = Math.floor(Math.random()*QUOTES.length);
  if(idx===currentQuoteIdx) idx=(idx+1)%QUOTES.length;
  renderQuoteOnHome(idx);
}
function renderQuotes(){
  const list = el('quotes-list');
  list.innerHTML = QUOTES.map((q,i)=>`
    <div class="quote-list-item" onclick="selectQuote(${i})">
      <div class="quote-list-text">${q.text}</div>
      <div class="quote-list-author">── ${q.author}</div>
      <div class="quote-list-apply">✦ ${q.apply}</div>
    </div>
  `).join('');
}
function selectQuote(idx){
  renderQuoteOnHome(idx);
  openPage('page-home');
}

// ==================== SCHEDULE ====================
function renderSchedule(){
  const list = el('schedule-list');
  const today = getToday();
  let html='';
  Object.entries(SCHEDULE).forEach(([date,s])=>{
    const isToday = date===today;
    const typeClass = s.type==='game'||s.type==='peak'?'game-day':s.type==='peak'?'peak-day':'';
    const todayClass = isToday?'today':'';
    
    const typeColors = {game:'badge-red',peak:'badge-red',cf:'badge-purple',gym:'badge-blue',outdoor:'badge-green',mobility:'badge-accent',baseball:'badge-orange',recovery:'badge-green',rest:'badge-accent','pre-game':'badge-accent'};
    const typeLabels = {game:'試合',peak:'⭐️大会',cf:'CF',gym:'ジム',outdoor:'屋外',mobility:'モビリティ',baseball:'練習',recovery:'回復',rest:'休養','pre-game':'前日準備'};
    
    const checks = s.check||[];

    html+=`<div class="day-card ${typeClass} ${todayClass}" id="day-${date}">
      <div class="day-header">
        <div>
          <span class="day-date">${formatDate(date)}</span>
          <span style="font-size:13px;color:var(--text3);margin-left:6px">${s.weekday}曜</span>
          ${isToday?'<span style="margin-left:6px;font-size:11px;background:var(--accent);color:#0a0e1a;padding:2px 6px;border-radius:4px;font-weight:700">TODAY</span>':''}
        </div>
        <span class="badge ${typeColors[s.type]||'badge-accent'}">${typeLabels[s.type]||s.type}</span>
      </div>
      ${s.event?`<div style="font-size:14px;font-weight:700;margin-bottom:8px">${s.event}</div>`:''}
      <div class="day-tags">
        ${s.crossfit?`<span class="badge badge-purple">CF</span>`:''}
        ${s.gym?`<span class="badge badge-blue">ジム</span>`:''}
        ${s.outdoor?`<span class="badge badge-green">屋外</span>`:''}
        ${s.mobility?`<span class="badge badge-accent">モビリティ</span>`:''}
      </div>
      <div class="day-aim" style="margin-bottom:${checks.length?'8px':'0'}">${s.aim}</div>
      ${checks.length>0?`
        <div style="border-top:1px solid var(--border);padding-top:8px;margin-top:2px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:5px">📌 確認ポイント</div>
          ${checks.map(c=>`<div style="font-size:12px;color:var(--text2);padding:3px 0;display:flex;gap:6px"><span style="color:var(--text3);flex-shrink:0">·</span>${c}</div>`).join('')}
        </div>
      `:''}
    </div>`;
  });
  list.innerHTML = html;
  // Scroll to today
  setTimeout(()=>{
    const todayEl = el('day-'+today);
    if(todayEl) todayEl.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

// ==================== RECORD ====================
// スケジュールから今日のチェック項目を生成する（カテゴリ別）
function buildCheckItems(dateStr){
  const sched = SCHEDULE[dateStr];
  if(!sched) return [
    {cat:'📋 基本', items:['自宅モビリティを実施した','水分を2L以上取った','8時間睡眠できた']}
  ];
  
  const groups = [];
  
  // トレーニング系
  const trainingItems = [];
  if(sched.crossfit) trainingItems.push(`CF実施（${sched.crossfit}）`);
  if(sched.gym) trainingItems.push(`オープンジム実施（${sched.gym}）`);
  if(sched.outdoor) trainingItems.push(`屋外メニュー実施（${sched.outdoor}）`);
  if(sched.mobility && sched.mobility!==false) trainingItems.push(`モビリティ実施（${sched.mobility}）`);
  if(sched.event && (sched.type==='game'||sched.type==='peak')) trainingItems.push('試合前ウォームアップを実施した');
  if(trainingItems.length) groups.push({cat:'🏋️ トレーニング', items: trainingItems});
  
  // 食事系
  const foodItems = [];
  const foodMap = {
    '試合日食事':['朝食を試合3〜4時間前に摂取した','補食（バナナ・おにぎり）を準備した','水分を3L以上取った'],
    '試合前日食事':['夕食は高炭水化物・低脂質で食べた','揚げ物を避けた','水分を2.5L以上取った'],
    '練習日食事':['タンパク質を毎食取った（鶏肉・魚・豆腐など）','揚げ物を避けた','水分を2L以上取った'],
    '休養日食事':['タンパク質を毎食取った','ご飯量を少し抑えた（休養日調整）','水分を2L以上取った'],
    '通常食':['タンパク質を毎食取った','水分を2L以上取った'],
    '通常食（タンパク質優先）':['タンパク質を毎食しっかり取った','水分を2L以上取った'],
    '通常食（炭水化物を少し増やす）':['炭水化物をいつもより少し多めに取った','タンパク質も確保した','水分を2L以上取った']
  };
  const foodKey = sched.food || '通常食';
  const defaultFoodItems = foodMap[foodKey] || foodMap['通常食'];
  groups.push({cat:'🍚 食事', items: defaultFoodItems});
  
  // リカバリー系（常に）
  const recItems = ['8時間睡眠できた'];
  if(sched.type==='game'||sched.type==='peak') recItems.push('試合後にストレッチ・モビリティをした');
  if(sched.type==='recovery') recItems.push('無理なトレーニングを追加しなかった');
  groups.push({cat:'🛌 リカバリー', items: recItems});
  
  // 日付ごとの特別チェック（scheduleのcheckリスト）
  if(sched.check && sched.check.length){
    groups.push({cat:'📌 今日のポイント', items: sched.check});
  }
  
  return groups;
}

// チェックキーは "checks2_{date}_{catIdx}_{itemIdx}" で管理
function getCheckKey(date, catIdx, itemIdx){
  return `chk_${date}_${catIdx}_${itemIdx}`;
}

function isChecked(date, catIdx, itemIdx){
  return localStorage.getItem(getCheckKey(date, catIdx, itemIdx)) === '1';
}

function toggleCheckNew(date, catIdx, itemIdx, totalItems){
  const key = getCheckKey(date, catIdx, itemIdx);
  const current = localStorage.getItem(key) === '1';
  localStorage.setItem(key, current ? '0' : '1');
  // 再レンダリング
  renderRecord(currentRecordTab);
  // ホームのチェックリストも更新
  if(el('home-checklist')) renderHomeChecklist();
}

function countChecks(date, groups){
  let done = 0, total = 0;
  groups.forEach((g, gi) => {
    g.items.forEach((_, ii) => {
      total++;
      if(isChecked(date, gi, ii)) done++;
    });
  });
  return {done, total};
}

function renderHomeChecklist(){
  const today = getToday();
  const groups = buildCheckItems(today);
  const {done, total} = countChecks(today, groups);
  const pct = total ? Math.round(done/total*100) : 0;
  
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:13px;color:var(--text2)">達成 <span style="color:var(--accent);font-weight:700;font-size:16px">${done}</span> / ${total} 項目</div>
      <div style="font-size:13px;font-weight:700;color:${pct===100?'var(--green)':pct>=60?'var(--accent)':'var(--text2)'}">${pct}%</div>
    </div>
    <div class="progress-bar" style="margin-bottom:14px"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;
  
  groups.forEach((g, gi) => {
    html += `<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;margin-top:${gi>0?'12px':'0'}">${g.cat}</div>`;
    g.items.forEach((item, ii) => {
      const checked = isChecked(today, gi, ii);
      html += `
        <div class="check-item" onclick="toggleCheckNew('${today}',${gi},${ii},${g.items.length})">
          <div class="check-box ${checked?'checked':''}">${checked?'✓':''}</div>
          <div class="check-label" style="${checked?'text-decoration:line-through;color:var(--text3)':''}">${item}</div>
        </div>`;
    });
  });
  
  el('home-checklist').innerHTML = html;
}

function showRecordTab(tab){
  currentRecordTab = tab;
  document.querySelectorAll('[data-rtab]').forEach(t=>{
    t.classList.toggle('active', t.dataset.rtab===tab);
  });
  renderRecord(tab);
}

function renderRecord(tab){
  const content = el('record-content');
  if(tab==='daily') content.innerHTML = renderDailyRecord();
  else if(tab==='weekly') content.innerHTML = renderWeeklyRecord();
  else if(tab==='history') content.innerHTML = renderHistory();
}

function renderDailyRecord(){
  const today = getToday();
  const groups = buildCheckItems(today);
  const {done, total} = countChecks(today, groups);
  const pct = total ? Math.round(done/total*100) : 0;
  
  const sched = SCHEDULE[today];
  const aimText = sched ? sched.aim : '今日のスケジュールを確認してください';
  
  let html = `
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px">今日の狙い</div>
      <div style="font-size:13px;color:var(--text);line-height:1.6">${aimText}</div>
    </div>
    
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:14px;font-weight:700">達成状況</div>
      <div style="font-size:22px;font-weight:900;color:${pct===100?'var(--green)':pct>=60?'var(--accent)':'var(--text2)'}">${pct}%</div>
    </div>
    <div class="progress-bar" style="margin-bottom:16px;height:10px"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;
  
  groups.forEach((g, gi) => {
    const groupDone = g.items.filter((_,ii)=>isChecked(today,gi,ii)).length;
    html += `
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:13px;font-weight:700">${g.cat}</div>
          <div style="font-size:12px;color:${groupDone===g.items.length?'var(--green)':'var(--text3)'};font-weight:600">${groupDone}/${g.items.length}</div>
        </div>
        ${g.items.map((item, ii) => {
          const checked = isChecked(today, gi, ii);
          return `
            <div class="check-item" onclick="toggleCheckNew('${today}',${gi},${ii},${g.items.length})">
              <div class="check-box ${checked?'checked':''}">${checked?'✓':''}</div>
              <div class="check-label" style="${checked?'text-decoration:line-through;color:var(--text3)':''}">${item}</div>
            </div>`;
        }).join('')}
      </div>`;
  });
  
  if(pct===100){
    html += `<div style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:var(--radius);padding:16px;text-align:center;margin-top:4px">
      <div style="font-size:24px;margin-bottom:6px">🎉</div>
      <div style="font-size:14px;font-weight:700;color:var(--green)">今日のすべてを達成！</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">6月6日への積み上げ、完璧です</div>
    </div>`;
  }
  
  html += `<div style="height:8px"></div>`;
  return html;
}

function renderWeeklyRecord(){
  // 今週（日曜始まり）の各日の達成率を集計
  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay());
  
  let weekRows = [];
  let totalDone = 0, totalItems = 0;
  
  for(let i=0;i<7;i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isPast = d <= today;
    const isToday2 = dateStr === getToday();
    const groups = buildCheckItems(dateStr);
    const {done, total} = countChecks(dateStr, groups);
    const pct = total ? Math.round(done/total*100) : 0;
    const sched = SCHEDULE[dateStr];
    if(isPast || isToday2){
      totalDone += done;
      totalItems += total;
    }
    weekRows.push({dateStr, d, isPast, isToday2, done, total, pct, sched});
  }
  
  const weekPct = totalItems ? Math.round(totalDone/totalItems*100) : 0;
  const weekdays2 = ['日','月','火','水','木','金','土'];
  
  let html = `
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">今週の総合達成率</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:13px;color:var(--text2)">${totalDone} / ${totalItems} 項目達成</div>
        <div style="font-size:28px;font-weight:900;color:${weekPct>=80?'var(--green)':weekPct>=50?'var(--accent)':'var(--text2)'}">${weekPct}%</div>
      </div>
      <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${weekPct}%"></div></div>
    </div>
    
    <div class="section-title">日ごとの達成状況</div>
  `;
  
  weekRows.forEach(({dateStr, d, isPast, isToday2, done, total, pct, sched}) => {
    if(!isPast && !isToday2){
      html += `<div class="card-sm" style="display:flex;align-items:center;gap:10px;opacity:0.4;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700;width:50px;flex-shrink:0">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:10px;color:var(--text3)">${weekdays2[d.getDay()]}</span></div>
        <div style="font-size:12px;color:var(--text3)">まだです</div>
      </div>`;
      return;
    }
    const barColor = pct===100?'var(--green)':pct>=60?'var(--accent)':'var(--red)';
    html += `<div class="card-sm" style="margin-bottom:6px;${isToday2?'border-color:var(--accent)':''}">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:13px;font-weight:700;width:50px;flex-shrink:0">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:10px;color:var(--text3)">${weekdays2[d.getDay()]}${isToday2?' 今日':''}</span></div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <div style="font-size:11px;color:var(--text2)">${sched?sched.event||getDayTypeName(sched.type):'フリー'}</div>
            <div style="font-size:13px;font-weight:700;color:${barColor}">${pct}%</div>
          </div>
          <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width 0.5s"></div>
          </div>
        </div>
      </div>
    </div>`;
  });
  
  return html;
}

function getDayTypeName(type){
  const m = {game:'試合',peak:'⭐️大会',cf:'クロスフィット',gym:'ジム',outdoor:'屋外',mobility:'モビリティ',baseball:'練習',recovery:'回復',rest:'休養','pre-game':'前日準備'};
  return m[type]||'練習日';
}

function renderHistory(){
  // 5/2〜6/7の全日程を逆順で表示
  const allDates = Object.keys(SCHEDULE).sort().reverse();
  const today = getToday();
  
  let html = '';
  allDates.forEach(dateStr => {
    const d = new Date(dateStr+'T12:00:00');
    const isPast = dateStr < today;
    if(!isPast) return; // 今日・未来はスキップ
    
    const groups = buildCheckItems(dateStr);
    const {done, total} = countChecks(dateStr, groups);
    const pct = total ? Math.round(done/total*100) : 0;
    const sched = SCHEDULE[dateStr];
    const barColor = pct===100?'var(--green)':pct>=60?'var(--accent)':'var(--red)';
    
    html += `<div class="card-sm" style="margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:13px;font-weight:700;width:60px;flex-shrink:0">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:10px;color:var(--text3)">${sched.weekday}</span></div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-size:11px;color:var(--text2);flex:1">${sched.event||getDayTypeName(sched.type)}</div>
            <div style="font-size:13px;font-weight:700;color:${barColor};flex-shrink:0;margin-left:8px">${pct}%</div>
          </div>
          <div style="height:5px;background:var(--bg3);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px"></div>
          </div>
          <div style="font-size:10px;color:var(--text3);margin-top:3px">${done}/${total}項目</div>
        </div>
      </div>
    </div>`;
  });
  
  if(!html) html = '<div class="card" style="text-align:center;color:var(--text2);font-size:14px">まだ記録がありません<br><span style="font-size:12px;color:var(--text3)">今日からチェックを始めよう</span></div>';
  return html;
}
